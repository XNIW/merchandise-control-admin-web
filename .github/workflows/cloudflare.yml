name: Cloudflare

on:
  pull_request:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      target:
        description: "Cloudflare action to run"
        required: true
        default: build-only
        type: choice
        options:
          - build-only
          - staging
          - production
      confirm_staging_gates_passed:
        description: "Required for production: staging deploy and smoke gates have passed"
        required: false
        default: false
        type: boolean
      confirm_user_approved_production:
        description: "Required for production: user explicitly approved production deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: cloudflare-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ inputs.target || 'build' }}
  cancel-in-progress: false

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  cloudflare-build:
    name: Cloudflare build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run security:scan

      - name: Foundation tests
        run: npm run test:foundation

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Next build
        run: npm run build

      - name: Cloudflare OpenNext build
        run: npm run cf:build

      - name: Cloudflare local smoke
        run: CF_SMOKE_SKIP_BUILD=1 npm run smoke:cloudflare:local

      - name: Diff whitespace check
        run: git diff --check

  deploy-staging:
    name: Deploy staging
    needs: cloudflare-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-staging
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cloudflare OpenNext build
        run: npm run cf:build

      - name: Verify Cloudflare auth inputs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const rawToken = process.env.CLOUDFLARE_API_TOKEN || "";
          const token = rawToken.replace(/[\r\n]/g, "");
          const account = process.env.CLOUDFLARE_ACCOUNT_ID || "";
          const status = {
            tokenPresent: token.length > 0,
            tokenLengthOk: token.length >= 40,
            tokenLooksCfut: token.startsWith("cfut_"),
            tokenHadNewlines: rawToken !== token,
            accountPresent: account.length > 0,
            accountShapeOk: /^[0-9a-f]{32}$/i.test(account),
          };
          console.log(JSON.stringify(status));
          if (!status.tokenPresent || !status.tokenLengthOk || !status.accountPresent || !status.accountShapeOk) {
            process.exit(1);
          }
          NODE

      - name: Verify Cloudflare token with API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          node <<'NODE'
          (async () => {
            const token = (process.env.CLOUDFLARE_API_TOKEN || "").replace(/[\r\n]/g, "");
            const res = await fetch("https://api.cloudflare.com/client/v4/user/tokens/verify", {
              headers: { Authorization: `Bearer ${token}` },
            });
            const json = await res.json();
            console.log(JSON.stringify({
              success: json.success,
              status: json.result?.status || null,
              errorCodes: Array.isArray(json.errors) ? json.errors.map((error) => error.code) : [],
            }));
            if (!json.success || json.result?.status !== "active") {
              process.exit(1);
            }
          })().catch((error) => {
            console.error(error?.message || error);
            process.exit(1);
          });
          NODE

      - name: Deploy Worker staging
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\r\n')"
          npx wrangler deploy --env staging --keep-vars --minify

      - name: Install Playwright browsers
        if: >-
          vars.CLOUDFLARE_STAGING_URL != '' &&
          vars.NEXT_PUBLIC_SUPABASE_URL != '' &&
          vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY != '' &&
          vars.STAGING_SUPABASE_PROJECT_REF != ''
        run: npm run playwright:install

      - name: Smoke staging
        if: >-
          vars.CLOUDFLARE_STAGING_URL != '' &&
          vars.NEXT_PUBLIC_SUPABASE_URL != '' &&
          vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY != '' &&
          vars.STAGING_SUPABASE_PROJECT_REF != ''
        env:
          ALLOWED_STAGING_SUPABASE_PROJECT_REFS: ${{ vars.ALLOWED_STAGING_SUPABASE_PROJECT_REFS || vars.STAGING_SUPABASE_PROJECT_REF }}
          ALLOW_STAGING_E2E: "yes"
          CONFIRM_STAGING_E2E: "yes"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          PLAYWRIGHT_BASE_URL: ${{ vars.CLOUDFLARE_STAGING_URL }}
          SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
        run: npm run smoke:staging

  deploy-production:
    name: Deploy production
    needs: cloudflare-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-production
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      inputs.target == 'production' &&
      inputs.confirm_staging_gates_passed &&
      inputs.confirm_user_approved_production

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cloudflare OpenNext build
        run: npm run cf:build

      - name: Deploy Worker production
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\r\n')"
          npx wrangler deploy --env production --keep-vars --minify
