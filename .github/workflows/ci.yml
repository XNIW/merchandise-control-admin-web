name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx', 'src/**/*.css', 'app/**/*.ts', 'app/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Security scan
        run: npm run security:scan

      - name: Foundation tests
        run: npm run test:foundation

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: UI smoke
        run: npm run test:ui-smoke:ci

      - name: Diff whitespace check
        run: git diff --check

  task-094-staging-e2e:
    name: TASK-094 staging E2E
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-staging

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST || vars.STAGING_SUPABASE_POOLER_HOST }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TASK094_POS_E2E_ALLOW_STAGING: "yes"
      TASK094_POS_E2E_BASE_URL: ${{ vars.CLOUDFLARE_STAGING_URL }}
      TASK094_POS_E2E_STAGING_HOST_ALLOWLIST: merchandise-control-admin-web-staging.merchandise-control-admin-web.workers.dev
      TASK094_POS_E2E_STAGING_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      TASK094_POS_E2E_TEST_RUN_ID: STG${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify staging E2E inputs
        run: |
          set -euo pipefail
          node <<'NODE'
          const required = [
            "NEXT_PUBLIC_SUPABASE_URL",
            "SUPABASE_DB_PASSWORD",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TASK094_POS_E2E_BASE_URL",
            "TASK094_POS_E2E_STAGING_PROJECT_REF",
          ];
          const status = Object.fromEntries(
            required.map((key) => [key, Boolean(process.env[key])]),
          );
          console.log(JSON.stringify(status));
          if (Object.values(status).some((present) => !present)) {
            process.exit(1);
          }
          NODE

      - name: Push Supabase staging migrations
        run: |
          set -euo pipefail
          npx --yes supabase@2.109.0 --version
          mapfile -t SUPABASE_POOLER_HOSTS < <(
            node <<'NODE'
          const explicit = (process.env.SUPABASE_POOLER_HOST || "").trim();
          const regions = [
            "sa-east-1",
            "us-east-1",
            "us-west-1",
            "us-west-2",
            "ca-central-1",
            "eu-west-1",
            "eu-west-2",
            "eu-west-3",
            "eu-central-1",
            "eu-north-1",
            "ap-south-1",
            "ap-southeast-1",
            "ap-southeast-2",
            "ap-northeast-1",
            "ap-northeast-2",
            "ap-east-1",
            "me-central-1",
            "af-south-1",
          ];
          const hosts = explicit
            ? [explicit]
            : regions.map((region) => `aws-0-${region}.pooler.supabase.com`);
          for (const host of hosts) {
            console.log(host);
          }
          NODE
          )

          SUPABASE_DB_URL=""
          for poolerHost in "${SUPABASE_POOLER_HOSTS[@]}"; do
            for poolerPort in 5432 6543; do
              candidate="$(
                SUPABASE_POOLER_HOST="$poolerHost" SUPABASE_POOLER_PORT="$poolerPort" node <<'NODE'
          const password = process.env.SUPABASE_DB_PASSWORD || "";
          const projectRef = process.env.SUPABASE_PROJECT_REF || "";
          const poolerHost = process.env.SUPABASE_POOLER_HOST || "";
          const poolerPort = process.env.SUPABASE_POOLER_PORT || "5432";

          if (!password || !projectRef || !poolerHost || !/^\d+$/.test(poolerPort)) {
            console.error("Missing Supabase DB push inputs.");
            process.exit(1);
          }

          process.stdout.write(
            `postgresql://postgres.${projectRef}:${encodeURIComponent(password)}@${poolerHost}:${poolerPort}/postgres?sslmode=require`,
          );
          NODE
              )"
              if timeout 30s npx --yes supabase@2.109.0 db push --dry-run --db-url "$candidate" --yes >"$RUNNER_TEMP/supabase-db-push-dry-run.log" 2>&1; then
                SUPABASE_DB_URL="$candidate"
                echo "Supabase IPv4 pooler selected: $poolerHost:$poolerPort"
                break 2
              fi
            done
          done

          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "No Supabase IPv4 pooler host accepted the staging credentials."
            sed -E 's#postgresql://[^[:space:]]+#postgresql://[REDACTED]#g' "$RUNNER_TEMP/supabase-db-push-dry-run.log" || true
            exit 1
          fi

          npx --yes supabase@2.109.0 db push --db-url "$SUPABASE_DB_URL" --yes

      - name: Run TASK-094 catalog import staging E2E
        run: npm run test:pos-catalog-import-staging-e2e
