name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx', 'src/**/*.css', 'app/**/*.ts', 'app/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Security scan
        run: npm run security:scan

      - name: Foundation tests
        run: npm run test:foundation

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: UI smoke
        run: npm run test:ui-smoke:ci

      - name: Diff whitespace check
        run: git diff --check

  task-094-staging-e2e:
    name: TASK-094 staging E2E
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-staging

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      STAGING_SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      SUPABASE_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TASK094_POS_E2E_ALLOW_STAGING: "yes"
      TASK094_POS_E2E_BASE_URL: ${{ vars.CLOUDFLARE_STAGING_URL }}
      TASK094_POS_E2E_STAGING_HOST_ALLOWLIST: merchandise-control-admin-web-staging.merchandise-control-admin-web.workers.dev
      TASK094_POS_E2E_STAGING_PROJECT_REF: ${{ vars.STAGING_SUPABASE_PROJECT_REF }}
      TASK094_POS_E2E_TEST_RUN_ID: STG${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify staging E2E inputs
        run: |
          set -euo pipefail
          node <<'NODE'
          const required = [
            "NEXT_PUBLIC_SUPABASE_URL",
            "SUPABASE_SERVICE_ROLE_KEY",
            "TASK094_POS_E2E_BASE_URL",
            "TASK094_POS_E2E_STAGING_PROJECT_REF",
          ];
          const status = Object.fromEntries(
            required.map((key) => [key, Boolean(process.env[key])]),
          );
          console.log(JSON.stringify(status));
          if (Object.values(status).some((present) => !present)) {
            process.exit(1);
          }
          NODE

      - name: Verify TASK-094 migration files before live E2E
        run: |
          set -euo pipefail
          test -f supabase/migrations/20260705120000_task_094_pos_catalog_import_sync.sql
          test -f supabase/migrations/20260706120000_task_094_pos_catalog_import_apply_rpc.sql
          test -f supabase/migrations/20260706143000_task_094_pos_catalog_import_ack_replay.sql

      - name: Run TASK-094 catalog import staging E2E
        run: npm run test:pos-catalog-import-staging-e2e
